name: white-sheet-breaker
title: White-sheet-breaker (модуль ритуала начала задачи)
type: learner-side
status: production


problem: |
  Студент откладывает или не может начать новую задачу из-за неопределённости 
  первого шага. Задача кажется слишком большой или размытой, что вызывает 
  психологический барьер и прокрастинацию.

hypothesis: |
  Превращение размытого намерения в конкретное правило «ЕСЛИ [сигнал] → ТО [действие]» 
  и немедленное выполнение микро-шага снижает психологическое сопротивление 
  и увеличивает долю начатых задач.

primary_user: Студент / обучающийся

inputs:
  - "Текстовое описание блокирующей ситуации (сигнал)"
  - "Описание действия, которое студент готов выполнить"
  - "Путь к целевому файлу (создать или открыть)"

outputs:
  - "Сформулированное правило «ЕСЛИ [сигнал] → ТО [действие]»"
  - "Выполненный первый шаг (открыт существующий файл, создан новый файл с шаблоном)"
  - "xAPI-утверждение о начале задачи с правилом и контекстом"
  - "Запись в логе (logs/breaker.log) в NDJSON-формате"

primary_interface: CLI (python -m breaker / make run-cli)

optional_interfaces:
  - REST API (в перспективе)
  - Webhook (в перспективе)

integrations:
  - "LRS: отправка xAPI-стейтментов (через core/xapi_client.py)"
  - "Редакторы/IDE: открытие файлов через системные команды (кроссплатформенно)"
  - "Системные утилиты: воспроизведение звука, открытие файлов"

mvp_scope: |
  - Формулирование одного правила «если-то» через диалог из 3 вопросов
  - Автоматическое выполнение одного начального шага:
    • открытие существующего файла (open_file)
    • создание нового файла с шаблоном (create_test)
  - Фоновое наблюдение за активностью с предложением помощи при бездействии
  - Запись события старта в лог (NDJSON)
  - Отправка xAPI-стейтмента в LRS (с поддержкой mock-режима)
  - Хранение и использование шаблонов правил (системные и пользовательские)
  - Pomodoro-таймер для концентрации (с выбором длительности)
  - Редактор шаблонов (CLI): создание, удаление, поиск, просмотр


architecture: |
  Модуль состоит из трёх слоёв:
  
  1. UI (breaker.ui):
     - dialog.py — диалог с пользователем (3 вопроса + выбор режима create/open)
     - timer.py — Pomodoro-таймер с поддержкой паузы
     - template_editor.py — CLI-редактор шаблонов
     - activity_monitor.py — фоновое наблюдение за активностью
     - help_menu.py — меню помощи при бездействии
  
  2. Engine/Storage (breaker.engine, breaker.storage):
     - executor.py — выполнение действий (open_file, create_test)
     - file_templates.py — генерация шаблонов содержимого для разных типов файлов
     - exceptions.py — кастомные исключения
     - templates.py — хранение шаблонов правил (JSON)
  
  3. Core (breaker.core):
     - schema.py — схемы данных (Ritual, RitualResult, xAPI)
     - tracker.py — логирование в NDJSON
     - xapi_client.py — отправка xAPI-стейтментов в LRS
  
  4. Оркестратор:
     - main.py — связывает все слои в единый цикл работы

tech_stack: |
  - Python 3.11+
  - Rich — для красивого CLI-интерфейса
  - Requests — для отправки xAPI-стейтментов
  - Pytest — для тестирования
  - Make — для автоматизации команд
  - NDJSON — формат логов


key_files:
  - "main.py — оркестратор, связывает все модули"
  - "core/schema.py — структуры данных Ritual, xAPI"
  - "core/tracker.py — логирование в NDJSON"
  - "core/xapi_client.py — отправка xAPI в LRS"
  - "engine/executor.py — выполнение действий"
  - "ui/dialog.py — диалог с пользователем"
  - "ui/activity_monitor.py — фоновое наблюдение"
  - "ui/help_menu.py — меню помощи"
  - "storage/templates.py — хранилище шаблонов"